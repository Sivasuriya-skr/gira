spring.application.name=gira-backend

# ─── CORS ────────────────────────────────────────────────────────
# Frontend origin — change this if your React app runs on a different port
app.cors.allowed-origins=http://localhost:5175,http://localhost:3000

# ─── Server ──────────────────────────────────────────────────────
server.port=8080

# ─── MySQL DataSource ────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/gira_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# ─── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Spring Session (JDBC) ───────────────────────────────────────
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=86400s

# ─── Logging ─────────────────────────────────────────────────────
logging.level.com.gira=DEBUG
logging.level.org.springframework.web=WARN
