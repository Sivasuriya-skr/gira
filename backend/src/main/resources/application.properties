spring.application.name=gira-backend

# ─── CORS ────────────────────────────────────────────────────────
# Frontend origin — change this if your React app runs on a different port
app.cors.allowed-origins=http://localhost:5175,http://localhost:3000

# ─── Server ──────────────────────────────────────────────────────
server.port=8080

# ─── PostgreSQL DataSource ───────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/gira_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=root

# ─── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# use update so schema is adjusted without dropping data on restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Spring Session (JDBC) ───────────────────────────────────────
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=86400s

# ─── Spring Security OAuth2 (Google Login via .env) ──────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ─── Spring Mail (Google SMTP via .env) ──────────────────────────
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=true

# OTP settings
app.otp.expiry-minutes=10

# Dashboard URL for email links
app.dashboard.url=${DASHBOARD_URL:http://localhost:5175}

# ─── Logging ─────────────────────────────────────────────────────
logging.level.com.gira=DEBUG
logging.level.org.springframework.web=WARN
